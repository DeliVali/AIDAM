<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>AIDAM — verificación abierta de información</title>
  <link rel="stylesheet" href="fuentes/fuentes.css">
  <link rel="stylesheet" href="estilo.css">
  <link rel="icon" type="image/svg+xml" href="icono.svg">
</head>
<body>

<canvas id="fondo" aria-hidden="true"></canvas>

<div class="aplicacion">

  <aside class="lateral">
    <div class="lateral-marca">
      <span class="marca-halo"><img class="marca-icono" src="icono.svg" alt=""></span>
      <div class="marca-textos">
        <span class="marca-logo">AIdam</span>
        <span class="marca-lema">verificación abierta</span>
      </div>
    </div>

    <button id="nueva-verificacion" class="boton-nueva">＋ Nueva verificación</button>

    <div class="lateral-etiqueta">Espacios de trabajo</div>
    <ul id="lista-espacios" class="lista-espacios"></ul>
    <button id="boton-anadir-carpeta" class="boton-carpeta" title="Añadir una carpeta como espacio de trabajo">
      <span>📁</span>
      <span class="carpeta-nombre">Añadir carpeta…</span>
    </button>

    <div class="lateral-etiqueta">Conversaciones</div>
    <ul id="lista-conversaciones" class="lista-historial">
      <li class="historial-vacio">Sin conversaciones todavía.</li>
    </ul>

    <div class="lateral-pie">
      <span id="estado-conexion" class="estado-conexion" title="Estado de la conexión">
        <span class="punto"></span><span id="estado-texto">conectando…</span>
      </span>
      <span class="lateral-version">
        v<span id="acerca-version">—</span> ·
        <a href="https://github.com/DeliVali/AIDAM" target="_blank" rel="noopener">GitHub</a>
      </span>
    </div>
  </aside>

  <div class="principal">
    <main id="conversacion" class="conversacion"></main>

    <footer class="pie">
      <div id="aviso-adjunto" class="aviso-adjunto oculto"></div>

      <div class="caja-entrada">
        <textarea id="entrada" rows="1"
          placeholder="Escribe una afirmación para verificar, o adjunta un documento…"
          autocomplete="off" spellcheck="true"></textarea>
        <div class="botones-entrada">
          <input type="file" id="selector-archivo" hidden>
          <div class="adjuntar">
            <button id="boton-adjuntar" class="boton-icono" title="Subir un documento">📎</button>
            <div id="menu-adjuntar" class="menu-adjuntar oculto" role="menu">
              <div class="menu-titulo">¿Qué documento subes?</div>
              <button class="menu-opcion" data-tipo="imagen" data-accept="image/*">🖼 Imagen o captura</button>
              <button class="menu-opcion" data-tipo="pdf" data-accept=".pdf">📄 PDF</button>
              <button class="menu-opcion" data-tipo="texto" data-accept=".txt,.md,.csv">📃 Texto (.txt, .md)</button>
            </div>
          </div>
          <button id="boton-enviar" class="boton-enviar" title="Verificar (Enter)">➤</button>
        </div>
      </div>

      <div class="controles">
        <label class="control" title="Automático ejecuta todo el pipeline; Pedir permiso pausa antes de cada búsqueda en la red">
          modo
          <select id="modo">
            <option value="auto" selected>⚡ Automático</option>
            <option value="permisos">🔒 Pedir permiso</option>
          </select>
        </label>
        <label class="control" title="Idioma de la afirmación">
          idioma
          <select id="idioma">
            <option value="es" selected>español</option>
            <option value="en">English</option>
            <option value="fr">français</option>
            <option value="de">Deutsch</option>
            <option value="pt">português</option>
            <option value="it">italiano</option>
          </select>
        </label>
        <label class="control" title="Guardar en la memoria del agente y avisar si ya se verificó antes">
          <input type="checkbox" id="opcion-memoria" checked> memoria
        </label>
      </div>
    </footer>
  </div>

</div>

<template id="plantilla-bienvenida">
  <section class="bienvenida">
    <img class="bienvenida-icono" src="icono.svg" alt="">
    <h1>¿Qué verificamos hoy?</h1>
    <p>
      AIDAM descompone la afirmación, busca evidencia en fuentes independientes,
      la juzga con un modelo especializado y responde <em>con sus citas</em>.
    </p>
    <div class="ejemplos">
      <button class="ejemplo">La Torre Eiffel está en París</button>
      <button class="ejemplo">El aluminio de las vacunas causa autismo</button>
      <button class="ejemplo">The Great Wall of China is visible from space</button>
    </div>
  </section>
</template>

<div id="avisos" class="avisos" aria-live="polite"></div>

<script src="fondo.js"></script>
<script src="app.js"></script>
</body>
</html>
